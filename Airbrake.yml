connectors:
  BlueRaven1:
    type: Compute Board
    subtype: Male
    pincount: 5
    pinlabels: [usb_5v, D-, D+, GND, GND]

  SensorBoard1:
    type: Compute Board
    subtype: Male
    pincount: 4
    pinlabels: [GND, SCL, SDA, +3.3V]

  MotorEncoder1:
    type: Compute Board
    subtype: Male
    pincount: 4
    pinlabels: [GND, Encoder_A, +5V, Encoder_B]

  VN-100-1:
    type: compute Board
    subtype: Male
    pincount: 6
    pinlabels: [+5V, MOSI, MISO, SCK, SC, GND]

  LimitSwitch1:
    type: Compute Board
    subtype: Male
    pincount: 2
    pinlabels: [+5V, GND]

  MotorDriver1:
    type: Compute Board
    subtype: Male
    pincount: 6
    pinlabels: [GND, Motordriver_pin_2, Motordriver_pin_3, Motordriver_pin_4, Motordriver_pin_5, +5V]

  BlueRaven:
    type: Sensor
    subtype: Male
    pincount: 6
    pinlabels: [+IN, GND, APO, Main, 3rd, 4th]

  SensorBoard:
    type: Sensor
    subtype: Male
    pincount: 4
    pinlabels: [GND, SCL, SDA, +3.3V]

  MotorControler_IN:
    type: Controler
    subtype: Screw
    pincount: 6
    pinlabels: [5V, 0-5V, GND, DIR, BRAKE, STOP]
    image:
      src: MotorControler_IN.png
      height: 110  # Scale the image size slightly down
      caption: The first wire from the compute board is cut and not actually connected.

  MotorControler_OUT:
    type: Controler
    subtype: Screw
    pincount: 5
    pinlabels: [MA, BA, MC, VCC, GND]
    image:
      src: MotorControler_OUT.png
      height: 110  # Scale the image size slightly down
      caption: Layout

  VN-100_J5:
    type: Sensor
    subtype: Male
    pincount: 30
    pinlabels: [GND, GND, GND, GND, TX2, RX2, TARE/RESTORE, NC, SYNC_OUT, WIN, ENABLE, TX1, RX1, RESV, SYNC_IN_2, SPI_SCK, SPI_MISO, REPRGM, NRST, SYNC_IN, SPI_CS, GPS_PPS, VBAT, RESV, RESV, GND, GPS_RF, GND]

  LimitSwitch:
    type: Sensor
    subtype: Clip
    pincount: 2
    pinlabels: [+5V, GND]

  Motor:
    type: Motor
    subtype: Female
    pincount: 5
    pinlabels: [...,...,...,...,...]

  MotorEncoder:
    type: sensor
    subtype: clip
    pincount: 4
    pinlabels: [...,...,...,...]

cables:
  W1:
    colors: [RD, WH, GN, BU]
    wirecount: 4
  W2:
    colors: [BK, YE, LB, RD]
    wirecount: 4
  W3:
    colors: [OG, YE, GN, VT]
    wirecount: 4
  W4:
    colors: [RD, LB, GN, YE, WH, BK]
    wirecount: 6
  W5:
    colors: [RD, BK]
    wirecount: 2
  W6:
    colors: [YE, YE, LB, WH, YE, BK]
    wirecount: 6
  W7:
    colors: [WH, YE, LB, RD, BK]
    wirecount: 5

connections:
  -
    - BlueRaven1: [1,2,3,4]
    - W1: [1,2,3,4]
#    - Blueraven: []
  -
    - SensorBoard1: [1,2,3,4]
    - W2: [1,2,3,4]
    - SensorBoard: [1,2,3,4]
  -
    - MotorEncoder1: [1,2,3,4]
    - W3: [1,2,3,4]
    - MotorEncoder: [1,2,3,4]
  -
    - VN-100-1: [1,2,3,4,5,6]
    - W4: [1,2,3,4,5,6]
    - VN-100_J5: [10, 17, 19, 16, 23, 18]
  -
    - LimitSwitch1: [1,2]
    - W5: [1,2]
    - LimitSwitch: [1,2]
  -
    - MotorDriver1: [1,2,3,4,5,6]
    - W6: [1,2,3,4,5,6]
    - MotorControler_IN: [1,2,6,5,3,4]
  -
    - MotorControler_OUT: [1,2,3,4,5]
    - W7: [1,2,3,4,5]
    - Motor: [1,2,3,4,5]